name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test application
      run: |
        echo "🧪 测试应用模块导入..."
        python -c "
        import sys
        sys.path.append('.')
        try:
            # 测试基础依赖
            import streamlit
            print('✅ streamlit导入成功')
            import zhipuai
            print('✅ zhipuai导入成功')
            
            # 测试AI模块
            from modules.zhipu_client import ZhipuClient
            print('✅ zhipu_client模块导入成功')
            from modules.image_recognition import ImageRecognition
            print('✅ image_recognition模块导入成功')
            from modules.recommendation import RecipeRecommender
            print('✅ recommendation模块导入成功')
            from modules.nutrition import NutritionAnalyzer
            print('✅ nutrition模块导入成功')
            
            # 测试语音模块（云端兼容版本）
            from modules.voice_assistant_cloud_enhanced import VoiceAssistantCloudEnhanced
            print('✅ voice_assistant_cloud_enhanced模块导入成功')
            
            print('🎉 所有模块导入测试通过')
        except Exception as e:
            print(f'❌ 模块导入失败: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
        "
        
    - name: Create static deployment package
      run: |
        echo "📦 创建部署包..."
        mkdir -p dist
        
        # 创建部署说明页面
        cat > dist/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>智能厨房助手 - 部署成功</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 40px 20px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    min-height: 100vh;
                    color: white;
                }
                .container {
                    background: rgba(255,255,255,0.1);
                    border-radius: 15px;
                    padding: 40px;
                    backdrop-filter: blur(10px);
                }
                .header {
                    text-align: center;
                    margin-bottom: 30px;
                }
                .feature-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                    gap: 20px;
                    margin: 30px 0;
                }
                .feature-card {
                    background: rgba(255,255,255,0.2);
                    padding: 20px;
                    border-radius: 10px;
                    text-align: center;
                }
                .deploy-info {
                    background: rgba(255,255,255,0.2);
                    padding: 20px;
                    border-radius: 10px;
                    margin: 20px 0;
                }
                code {
                    background: rgba(0,0,0,0.3);
                    padding: 5px 10px;
                    border-radius: 5px;
                    font-family: monospace;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <div class="header">
                    <h1>🍳 智能厨房助手</h1>
                    <p>基于智谱AI的智能厨房助手 - 部署成功！</p>
                </div>
                
                <div class="deploy-info">
                    <h3>🚀 部署状态</h3>
                    <p>✅ 应用已成功部署到 GitHub Pages</p>
                    <p>🌐 访问地址: <code>https://zcz10086-dot.github.io/kitchen-assistant</code></p>
                </div>
                
                <div class="feature-grid">
                    <div class="feature-card">
                        <h3>📷 食材识别</h3>
                        <p>使用GLM-4V模型智能识别图片中的食材</p>
                    </div>
                    <div class="feature-card">
                        <h3>🍽️ 智能推荐</h3>
                        <p>基于可用食材和用户偏好推荐菜品</p>
                    </div>
                    <div class="feature-card">
                        <h3>🥗 营养分析</h3>
                        <p>分析食材的营养成分和健康建议</p>
                    </div>
                    <div class="feature-card">
                        <h3>🎤 语音助手</h3>
                        <p>中文语音识别和语音播报功能</p>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 40px;">
                    <h3>🔧 本地运行</h3>
                    <p>要在本地运行完整的Streamlit应用：</p>
                    <code>streamlit run app.py</code>
                    <br><br>
                    <a href="https://github.com/zcz10086-dot/kitchen-assistant" 
                       style="background: white; color: #667eea; padding: 12px 24px; 
                              text-decoration: none; border-radius: 8px; font-weight: bold;">
                        📁 查看GitHub仓库
                    </a>
                </div>
            </div>
        </body>
        </html>
        EOF
        
        echo "✅ 部署包创建完成"
        
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: ./dist
        
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2